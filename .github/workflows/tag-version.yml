name: Tag Version and Trigger Release

on:
  push:
    branches:
      - main
      - dev
    paths:
      - package.json

permissions:
  contents: write

jobs:
  tag-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create version tag and trigger release build
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const tag = `v${pkg.version}`;
            const { owner, repo } = context.repo;
            const branch = context.ref.replace('refs/heads/', '');

            core.info(`Checking if ${tag} already exists`);
            try {
              await github.rest.git.getRef({ owner, repo, ref: `tags/${tag}` });
              core.info(`Tag ${tag} already exists. Skipping.`);
              return;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            await github.rest.git.createRef({
              owner,
              repo,
              ref: `refs/tags/${tag}`,
              sha: context.sha,
            });

            core.notice(`Created tag ${tag} at ${context.sha}`);

            await github.rest.actions.createWorkflowDispatch({
              owner,
              repo,
              workflow_id: 'release-build.yml',
              ref: branch,
              inputs: {
                tag,
              },
            });

            core.notice(`Triggered Release Build workflow for ${tag}`);
